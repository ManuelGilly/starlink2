services:
  postgres:
    image: postgres:16-alpine
    container_name: starlink_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: starlink_ve
      POSTGRES_USER: starlink
      POSTGRES_PASSWORD: starlink
    ports:
      - "5433:5432"
    volumes:
      # Bind mount local: los datos viven dentro del proyecto, en ./data/postgres
      # Así sobreviven a `docker compose down` y se mantienen entre sesiones.
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U starlink -d starlink_ve"]
      interval: 5s
      timeout: 5s
      retries: 10
